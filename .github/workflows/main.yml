name: ilan.gov Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kutuphaneleri yukle
        run: pip install -r requirements.txt

      - name: Programi calistir
        run: python app.py
