name: ilan.gov Takip

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Kodlari cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kutuphaneleri yukle
        run: pip install -r requirements.txt

      - name: Programi calistir
        run: python app.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: seen.json kaydet
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add seen.json

          git diff --staged --quiet || git commit -m "seen.json guncelle"

          git push
